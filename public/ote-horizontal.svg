<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 160" width="760" height="160" fill="none" role="img" aria-labelledby="lockup-title lockup-desc">
  <title id="lockup-title">Observatorios Técnicos Ecuador</title>
  <desc id="lockup-desc">Lockup horizontal con isotipo circular y tipografía completa</desc>

  <g transform="translate(20,20)">
    <circle cx="60" cy="60" r="52" stroke="#F5A623" stroke-width="1.8"/>
    <g stroke="#F5A623" stroke-width="1.8" stroke-linecap="round">
      <line x1="60" y1="2" x2="60" y2="12"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(30 60 60)"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(60 60 60)"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(90 60 60)"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(120 60 60)"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(150 60 60)"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(180 60 60)"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(210 60 60)"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(240 60 60)"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(270 60 60)"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(300 60 60)"/>
      <line x1="60" y1="2" x2="60" y2="12" transform="rotate(330 60 60)"/>
    </g>
    <text x="60" y="53" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="14" font-weight="700" fill="#F5A623" letter-spacing="2">OTE</text>
    <circle cx="60" cy="75" r="9" stroke="#F5A623" stroke-width="1.8"/>
  </g>

  <g transform="translate(160,0)">
    <text x="0" y="38" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="14" font-weight="500" fill="#64748B" letter-spacing="6">REPÚBLICA DEL ECUADOR</text>
    <text x="0" y="80" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="34" font-weight="700" fill="#0F172A">Observatorios Técnicos </text>
    <text x="377" y="80" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="34" font-weight="700" fill="#F5A623">Ecuador</text>
    <text x="0" y="114" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748B">Plataformas para la generación de políticas públicas basadas en evidencia técnica</text>
  </g>
</svg>
